<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorkBuddy 面板</title>
<style>
/* Theme tokens aligned with CPA management panel (key-policy / themes.scss):
   default :root = light (paper); data-theme=white | dark; embedded iframe syncs parent. */
:root{
  --bg:#faf9f5;--card:#ffffff;--border:#e3e1db;--fg:#2d2a26;--mut:#6d6760;
  --acc:#4c8dff;--on-acc:#ffffff;--ok:#10b981;--warn:#e0aa14;--err:#c65746;
  --surface:#f0eee8;--surface-muted:#e9e6df;--btn-sec:#eef1f6;--btn-sec-hover:#e4e8ef;
  --input-bg:#ffffff;--code-bg:#f3f4f6;--code-fg:#374151;--placeholder:rgba(109,103,96,.55);
  --ok-soft:rgba(16,185,129,.10);--ok-border:rgba(16,185,129,.30);
  --warn-soft:rgba(224,170,20,.12);--warn-border:rgba(224,170,20,.32);
  --err-soft:rgba(198,87,70,.10);--err-border:rgba(198,87,70,.30);
  --mut-soft:rgba(109,103,96,.12);--mut-border:rgba(109,103,96,.28);
  --scrim:rgba(45,42,38,.35);--toast-shadow:0 10px 28px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);
  --modal-shadow:0 24px 56px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.04);
  --acc-ring:rgba(76,141,255,.18);--radius-md:12px;--radius-lg:16px;
  color-scheme:light
}
:root[data-theme="white"]{
  --bg:#f5f5f5;--card:#ffffff;--border:#e6e6e6;--fg:#1f1f1f;--mut:#707070;
  --surface:#fafafa;--surface-muted:#efefef;--btn-sec:#f0f0f0;--btn-sec-hover:#e8e8e8;
  --input-bg:#ffffff;--code-bg:#f3f4f6;--code-fg:#374151;--placeholder:rgba(112,112,112,.55);
  --scrim:rgba(0,0,0,.32);--toast-shadow:0 10px 28px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.04);
  --modal-shadow:0 24px 56px rgba(0,0,0,.16),0 0 0 1px rgba(0,0,0,.04);
  color-scheme:light
}
:root[data-theme="dark"]{
  --bg:#1e1d1b;--card:#26241f;--border:#3a3833;--fg:#ede9e3;--mut:#9a948c;
  --acc:#4c8dff;--on-acc:#ffffff;--ok:#34d399;--warn:#f0c050;--err:#e07a6a;
  --surface:#2f2d28;--surface-muted:#35332e;--btn-sec:#35332e;--btn-sec-hover:#3f3c36;
  --input-bg:#1e1d1b;--code-bg:#35332e;--code-fg:#d6d1c9;--placeholder:rgba(154,148,140,.55);
  --ok-soft:rgba(52,211,153,.12);--ok-border:rgba(52,211,153,.38);
  --warn-soft:rgba(240,192,80,.14);--warn-border:rgba(240,192,80,.38);
  --err-soft:rgba(224,122,106,.12);--err-border:rgba(224,122,106,.38);
  --mut-soft:rgba(154,148,140,.16);--mut-border:rgba(154,148,140,.32);
  --scrim:rgba(0,0,0,.55);--toast-shadow:0 10px 28px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.03);
  --modal-shadow:0 24px 56px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04);
  --acc-ring:rgba(76,141,255,.28);
  color-scheme:dark
}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;margin:0 0 4px}.sub{color:var(--mut);font-size:13px;margin-bottom:20px}
.bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
button{background:var(--acc);color:var(--on-acc);border:0;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
button.sec{background:var(--btn-sec);color:var(--fg)}button.sec:hover{background:var(--btn-sec-hover)}button:disabled{opacity:.5;cursor:default}
.toggle{display:flex;gap:8px;align-items:center;color:var(--mut);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.card h2{font-size:15px;margin:0 0 2px;display:flex;justify-content:space-between;align-items:center}
.uid{color:var(--mut);font-size:11px;font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:12px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok-border)}
.badge.exhausted{background:var(--err-soft);color:var(--err);border:1px solid var(--err-border)}
.badge.pro{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn-border)}
.badge.cn{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok-border)}
.badge.global{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn-border)}
.badge.disabled{background:var(--mut-soft);color:var(--mut);border:1px solid var(--mut-border)}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ftag{background:var(--surface);border:1px solid var(--border);color:var(--mut);border-radius:99px;padding:5px 14px;font-size:12px;cursor:pointer;font-weight:600}
.ftag.active{background:var(--acc);color:var(--on-acc);border-color:var(--acc)}
.ftag .cnt{font-size:10px;opacity:.75;margin-left:4px}
/* 用量汇总卡：跟 CPA 一样走 --card，白天白/纸色，晚上深色 */
.summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.summary-hd{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.summary-title{font-weight:700;font-size:14px}
.summary-meta{color:var(--mut);font-size:12px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px}
.summary-item{background:var(--surface-muted);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.summary-item .k{color:var(--mut);font-size:11px;margin-bottom:4px}
.summary-item .v{font-size:18px;font-weight:700}
.summary-item .v.ok{color:var(--ok)}
.summary-item .v.warn{color:var(--warn)}
.summary-item .v.err{color:var(--err)}
.summary .pb{margin-top:4px}
.row{display:flex;justify-content:space-between;padding:5px 0;border-top:1px dashed var(--border)}
.row:first-of-type{border-top:0}.k{color:var(--mut)}.v{font-weight:600}
.v.ok{color:var(--ok)}.v.warn{color:var(--warn)}.v.err{color:var(--err)}
.pkgs{margin-top:10px;font-size:12px;color:var(--mut)}
.pkgs .p{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--border)}
.pb{margin-top:10px}
.pb-label{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:6px}
.pb-track{height:8px;background:var(--surface-muted);border-radius:99px;overflow:hidden}
.pb-bar{height:100%;background:var(--ok);border-radius:99px;transition:width .6s ease}
.pb-meta{font-size:11px;color:var(--mut);margin-top:6px}
.actions{margin-top:12px;display:flex;gap:8px}
.field-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--fg)}
/* 右上角滑入通知栈 */
.toasts{position:fixed;top:16px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:9999;max-width:360px}
.toast{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--acc);border-radius:var(--radius-md);padding:14px 18px;font-size:13px;box-shadow:var(--toast-shadow);transform:translateX(120%);opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.1),opacity .25s;cursor:pointer;word-break:break-all}
.toast.show{transform:translateX(0);opacity:1}
.toast.ok{border-left-color:var(--ok);background:var(--ok-soft)}
.toast.warn{border-left-color:var(--warn);background:var(--warn-soft)}
.toast.err{border-left-color:var(--err);background:var(--err-soft)}
button.done{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok-border);cursor:default;opacity:1}
button.done:disabled{opacity:1}
.toast .t{font-weight:600;margin-bottom:3px}
.toast .d{color:var(--mut);font-size:12px;line-height:1.45}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--on-acc);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
button .spin{border-color:var(--on-acc);border-top-color:transparent}
.loading{color:var(--mut);text-align:center;padding:40px}
.modal-mask{position:fixed;inset:0;background:var(--scrim);display:none;align-items:center;justify-content:center;z-index:9000;padding:16px;backdrop-filter:blur(2px)}
.modal-mask.show{display:flex}
.modal{background:var(--card);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius-lg);width:min(560px,100%);max-height:min(90vh,640px);display:flex;flex-direction:column;box-shadow:var(--modal-shadow)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.modal-hd h2{font-size:15px;margin:0;color:var(--fg);font-weight:600}
.modal-x{background:transparent;color:var(--mut);padding:4px 10px;font-size:18px;line-height:1}
.modal-x:hover{color:var(--fg);background:var(--surface-muted)}
.modal-bd{padding:16px;overflow:auto}
.modal-bd .hint{color:var(--mut);font-size:12px;margin:0 0 10px;line-height:1.5}
.modal-bd .hint code{background:var(--code-bg);color:var(--code-fg);padding:1px 5px;border-radius:4px;font-size:11px}
.modal-bd textarea{width:100%;min-height:160px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font:12px/1.45 ui-monospace,monospace;resize:vertical;outline:none}
.modal-bd textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-ring)}
.modal-bd textarea::placeholder{color:var(--placeholder)}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.modal-ft button.sec{background:var(--btn-sec);color:var(--fg)}
.modal-ft button.sec:hover{background:var(--btn-sec-hover)}
</style>
<script>
/* Early theme sync (before body paint): mirror CPA parent data-theme when
   embedded; standalone falls back to prefers-color-scheme. Same semantics as
   cpa-plugin-key-policy themeSync (DOM data-theme is source of truth). */
(function(){
  var ATTR="data-theme";
  function embedded(){try{return window.self!==window.top}catch(e){return false}}
  function apply(t){
    var el=document.documentElement;
    if(t==="white"||t==="dark")el.setAttribute(ATTR,t);
    else el.removeAttribute(ATTR);
  }
  function parentTheme(){
    if(!embedded())return null;
    try{
      var raw=window.parent.document.documentElement.getAttribute(ATTR);
      if(raw==="white"||raw==="dark")return raw;
      return "light";
    }catch(e){return null}
  }
  function systemTheme(){
    try{return window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}catch(e){return "light"}
  }
  function sync(){apply(parentTheme()||systemTheme())}
  sync();
  window.__wbThemeSync=function(){
    sync();
    if(!embedded()){
      try{
        var mq=window.matchMedia("(prefers-color-scheme: dark)");
        var on=function(){sync()};
        if(mq.addEventListener)mq.addEventListener("change",on);
        else if(mq.addListener)mq.addListener(on);
      }catch(e){}
      return;
    }
    try{
      var parentEl=window.parent.document.documentElement;
      new MutationObserver(sync).observe(parentEl,{attributes:true,attributeFilter:[ATTR]});
      window.addEventListener("storage",function(e){if(e.key==="cli-proxy-theme")sync()});
    }catch(e){}
  };
})();
</script>
</head>
<body>
<div class="wrap">
  <h1>WorkBuddy 账号面板</h1>
  <div class="sub">积分余额 · CN 每日签到（09:00/21:00）· Global 专家包一次性手动领取 · 耗尽自动关/删</div>
  <div id="authBox" class="card" style="display:none;margin-bottom:16px">
    <div style="margin-bottom:8px;color:var(--mut)">需要管理密钥（management key）才能访问账号数据。从 CPA 主面板嵌入时会自动获取，无需输入。错误密钥请勿连点，避免 IP 封禁。</div>
    <div style="display:flex;gap:8px">
      <input id="keyInput" type="password" placeholder="management key" class="field-input">
      <button onclick="saveKey()">连接</button>
    </div>
  </div>
  <div class="bar">
    <button class="sec" id="importBtn" onclick="openImportModal()">导入凭证</button>
    <button id="refreshBtn" onclick="load(true,this)">刷新数据</button>
    <button class="sec" onclick="checkinAll(this)">全部签到</button>
    <button class="sec" onclick="claimTrialAll(this)" title="仅 Global · 一次性">全部领取</button>
    <label class="toggle" title="仅 CN 账号 09:00 / 21:00"><input type="checkbox" id="autoToggle" onchange="toggleAuto(this.checked)"> 自动签到(CN)</label>
    <span class="toggle" id="svtime"></span>
  </div>
  <div class="filter-bar" id="filterBar">
    <button type="button" class="ftag active" data-region="all" onclick="filterRegion('all',this)">全部 <span class="cnt" id="cntAll">0</span></button>
    <button type="button" class="ftag" data-region="cn" onclick="filterRegion('cn',this)">CN <span class="cnt" id="cntCn">0</span></button>
    <button type="button" class="ftag" data-region="global" onclick="filterRegion('global',this)">Global <span class="cnt" id="cntGlobal">0</span></button>
  </div>
  <div class="summary" id="summaryBox" style="display:none"></div>
  <div id="grid" class="grid"><div class="loading">加载中…</div></div>
</div>
<div class="modal-mask" id="importModal" onclick="onImportMaskClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
    <div class="modal-hd">
      <h2 id="importModalTitle">导入凭证 JSON</h2>
      <button type="button" class="modal-x" onclick="closeImportModal()" aria-label="关闭">×</button>
    </div>
    <div class="modal-bd">
      <p class="hint">支持 nested <code>{"auth":{...},"account":{...}}</code> 或 flat <code>{"accessToken":...}</code>。落盘为 <code>workbuddy-&lt;uid&gt;.json</code>。</p>
      <textarea id="importRaw" rows="8" placeholder='粘贴 WorkBuddy / CodeBuddy 凭证 JSON'></textarea>
    </div>
    <div class="modal-ft">
      <button type="button" class="sec" onclick="closeImportModal()">取消</button>
      <button type="button" onclick="importAuth(this)">导入并保存</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
const API = "/v0/management/plugins/workbuddy";

/* ---------- management key acquisition (3 fallbacks, zero config) ----------
   1) CPA main panel localStorage "cli-proxy-auth" (XOR+base64, same-origin
      iframe embed) — same approach as cpa-plugin-key-policy.
   2) ?key= URL param (cleaned from history after read, kept in sessionStorage).
   3) Manual input (sessionStorage only, never persisted).
*/
const ENC_PREFIX = "enc::v1::";
const SECRET_SALT = "cli-proxy-api-webui::secure-storage";
const PANEL_STORE = "cli-proxy-auth";
const SS_KEY = "workbuddy-mgmt-key";

function _enc(t){return new TextEncoder().encode(t)}
function _dec(b){return new TextDecoder().decode(b)}
function _keyBytes(){try{return _enc(SECRET_SALT+"|"+window.location.host+"|"+navigator.userAgent)}catch(e){return _enc(SECRET_SALT)}}
function _xor(d,k){const r=new Uint8Array(d.length);for(let i=0;i<d.length;i++)r[i]=d[i]^k[i%k.length];return r}
function _b64e(b){let s="";for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s)}
function _b64d(s){const bin=atob(s);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b}
function deobfuscate(p){if(!p||!p.startsWith(ENC_PREFIX))return p;try{return _dec(_xor(_b64d(p.slice(ENC_PREFIX.length)),_keyBytes()))}catch(e){return p}}
function isEmbedded(){try{return window.self!==window.top}catch(e){return false}}

function readPanelKey(){
  if(!isEmbedded())return null;
  let raw;try{raw=localStorage.getItem(PANEL_STORE)}catch(e){return null}
  if(!raw)return null;
  try{
    const parsed=JSON.parse(deobfuscate(raw));
    const st=(parsed&&parsed.state)||parsed||{};
    return typeof st.managementKey==="string"&&st.managementKey?st.managementKey:null;
  }catch(e){return null}
}
function readUrlKey(){
  const m=new URLSearchParams(window.location.search).get("key");
  if(m){history.replaceState(null,"",window.location.pathname)}
  return m;
}
function getKey(){
  return sessionStorage.getItem(SS_KEY)||readPanelKey()||readUrlKey();
}
function saveKey(){
  const v=document.getElementById("keyInput").value.trim();
  if(!v)return;
  sessionStorage.setItem(SS_KEY,v);
  document.getElementById("authBox").style.display="none";
  load(false);
}
function showAuth(){document.getElementById("authBox").style.display="block";const i=document.getElementById("keyInput");i&&i.focus()}
function authHeaders(k){return k?{"Authorization":"Bearer "+k}:{}}
/* --------------------------------------------------------------------------- */

function toast(title, kind="ok", detail=""){
  const box=document.getElementById("toasts");
  const el=document.createElement("div");
  el.className="toast "+kind;
  el.innerHTML='<div class="t"></div>'+(detail?'<div class="d"></div>':'');
  el.querySelector(".t").textContent=title;
  if(detail)el.querySelector(".d").textContent=detail;
  box.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("show")));
  const kill=()=>{el.classList.remove("show");setTimeout(()=>el.remove(),300)};
  el.onclick=kill;
  setTimeout(kill, kind==="err"?6000:4000);
  while(box.children.length>5)box.firstChild.remove();
}
function busy(btn, on){
  if(!btn)return;
  if(on){btn.dataset.orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spin"></span>处理中…'}
  else{btn.disabled=false;if(btn.dataset.orig)btn.innerHTML=btn.dataset.orig}
}
// Immediate UI: mark a check-in button as done so user doesn't see "签到" flash
// while load() re-fetches (which can take seconds).
function markCheckinDone(btn){
  if(!btn)return;
  btn.disabled=true;
  btn.className="done";
  btn.innerHTML="已签到";
  btn.dataset.orig="已签到";
}
function markTrialDone(btn){
  if(!btn)return;
  btn.disabled=true;
  btn.className="done";
  btn.innerHTML="已领取";
  btn.dataset.orig="已领取";
}
function fmtRemain(c){if(!c)return "-";const t=(c.total_remain||0)+(c.total_used||0);return c.total_remain+" 余 / "+t+" 总"}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function progressHTML(c){
  // total uses size when known; remain = spendable, used = cycle spend.
  // Check-in adds packs → size/remain go UP (grant). Chat spend → used goes UP, remain DOWN.
  if(!c||(!(c.total_remain||0)&&!(c.total_used||0)&&!(c.total_size||0)))return '<div class="pb"><div class="pb-label"><span>可用积分</span><span>-</span></div><div class="pb-track"><div class="pb-bar" style="width:0%"></div></div></div>';
  const remain=c.total_remain||0, used=c.total_used||0;
  const size=c.total_size||(remain+used);
  const total=size>0?size:(remain+used);
  const pct=total>0?Math.round(used/total*100):0;
  let color='var(--ok)'; if(pct>60)color='var(--warn)'; if(pct>85)color='var(--err)';
  const when=c.fetched_at?` · 快照 ${esc(String(c.fetched_at).replace('T',' ').replace('Z',' UTC'))}`:'';
  return `<div class="pb"><div class="pb-label"><span>可用 ${remain}</span><span>已用 ${used} · ${pct}%</span></div><div class="pb-track"><div class="pb-bar" style="width:${pct}%;background:${color}"></div></div><div class="pb-meta">剩余 ${remain} · 已用 ${used} · 额度池 ${total}${c.pack_count?` · ${c.pack_count} 个包`:''}${when}</div></div>`;
}
function card(a){
  const plan=(a.plan||"unknown").toLowerCase();
  const ci=a.checkin||{}, cr=a.credits;
  const exhausted=!!a.exhausted||(!!cr&&(cr.total_remain||0)===0&&((cr.total_used||0)>0||(cr.packages&&cr.packages.length)));
  const region=a.region||"cn";
  const isGlobal=region==="global";
  const disabled=!!a.disabled;
  const regionBadge=`<span class="badge ${region}">${isGlobal?"Global":"CN"}</span>`;
  // CN: 签到 button; Global: 领取专家加油包 button (or 已领取 if trial_claimed)
  let actionHTML;
  if(isGlobal){
    if(a.trial_claimed){
      actionHTML='<button class="done" disabled="disabled">已领取</button>';
    }else{
      actionHTML=`<button class="sec" onclick="claimTrial('${esc(a.auth_index)}',this)">领取专家加油包</button>`;
    }
  }else{
    const checked=ci.today_checked_in;
    const btnClass=checked?"done":"sec";
    const btnText=checked?"已签到":"签到";
    const btnDisabled=checked?" disabled=\"disabled\"":"";
    actionHTML=`<button class="${btnClass}" onclick="checkin('${esc(a.auth_index)}',this)"${btnDisabled}>${btnText}</button>`;
  }
  const badges=(disabled?`<span class="badge disabled">已禁用</span>`:"")+(exhausted?`<span class="badge exhausted">耗尽</span>`:"")+regionBadge+`<span class="badge ${plan}">${esc(a.plan||"-")}</span>`;
  return `<div class="card" data-region="${region}">
  <h2>${esc(a.nickname||a.label||a.name)} <span style="display:flex;gap:6px;align-items:center">${badges}</span></h2>
  <div class="uid">${esc(a.uid||"")} · ${esc(a.name||"")}</div>
  ${progressHTML(cr)}
  ${a.error?`<div class="row"><span class="k">错误</span><span class="v err">${esc(a.error)}</span></div>`:""}
  <div class="actions">${actionHTML}</div>
  </div>`;
}
let currentFilter="all";
let lastAccounts=[];
let authFailCount=0;
let authFailUntil=0;
function filterRegion(region, btn){
  currentFilter=region||"all";
  document.querySelectorAll(".ftag").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  else{
    document.querySelectorAll(".ftag").forEach(b=>{
      if(b.dataset.region===currentFilter) b.classList.add("active");
    });
  }
  document.querySelectorAll("#grid .card").forEach(c=>{
    const r=c.dataset.region||"cn";
    c.style.display=(currentFilter==="all"||r===currentFilter)?"":"none";
  });
  renderSummary(lastAccounts);
}
function updateFilterCounts(accounts){
  let cn=0, gl=0;
  (accounts||[]).forEach(a=>{
    if((a.region||"cn")==="global") gl++; else cn++;
  });
  const elAll=document.getElementById("cntAll");
  const elCn=document.getElementById("cntCn");
  const elGl=document.getElementById("cntGlobal");
  if(elAll) elAll.textContent=String((accounts||[]).length);
  if(elCn) elCn.textContent=String(cn);
  if(elGl) elGl.textContent=String(gl);
}
function accountsForFilter(accounts){
  const list=accounts||[];
  if(currentFilter==="all") return list;
  return list.filter(a=>(a.region||"cn")===currentFilter);
}
function creditOf(a){
  const cr=a&&a.credits;
  if(!cr) return {remain:0, used:0, size:0, known:false};
  const remain=Number(cr.total_remain)||0;
  const used=Number(cr.total_used)||0;
  const size=Number(cr.total_size)||0;
  // known if we have any usage signal, size, or packages
  const known=remain>0||used>0||size>0||(Array.isArray(cr.packages)&&cr.packages.length>0);
  return {remain, used, size, known};
}
function renderSummary(accounts){
  const box=document.getElementById("summaryBox");
  if(!box) return;
  const all=accounts||[];
  if(!all.length){
    box.style.display="none";
    box.innerHTML="";
    return;
  }
  const scoped=accountsForFilter(all);
  let remain=0, used=0, size=0, knownN=0, disabledN=0, exhaustedN=0;
  let cnRemain=0, cnUsed=0, glRemain=0, glUsed=0;
  scoped.forEach(a=>{
    const c=creditOf(a);
    if(c.known){ remain+=c.remain; used+=c.used; size+=c.size; knownN++; }
    if(a.disabled) disabledN++;
    if(a.exhausted||(c.known&&c.remain===0&&(c.used>0||c.size>0))) exhaustedN++;
  });
  let allRemain=0, allUsed=0, allSize=0;
  all.forEach(a=>{
    const c=creditOf(a);
    if(!c.known) return;
    allRemain+=c.remain; allUsed+=c.used; allSize+=c.size;
    if((a.region||"cn")==="global"){ glRemain+=c.remain; glUsed+=c.used; }
    else { cnRemain+=c.remain; cnUsed+=c.used; }
  });
  const total=size>0?size:(remain+used);
  const pct=total>0?Math.round(used/total*100):0;
  let barColor="var(--ok)"; if(pct>60)barColor="var(--warn)"; if(pct>85)barColor="var(--err)";
  const scopeLabel=currentFilter==="all"?"全部账号":(currentFilter==="global"?"Global 账号":"CN 账号");
  const allTotal=allSize>0?allSize:(allRemain+allUsed);
  box.style.display="block";
  box.innerHTML=`
    <div class="summary-hd">
      <div class="summary-title">用量汇总 · ${esc(scopeLabel)}</div>
      <div class="summary-meta">${scoped.length} 个账号 · 有数据 ${knownN} · 禁用 ${disabledN} · 耗尽 ${exhaustedN}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-item"><div class="k">剩余(可用)</div><div class="v ok">${remain}</div></div>
      <div class="summary-item"><div class="k">已用(消耗)</div><div class="v ${pct>85?"err":(pct>60?"warn":"")}">${used}</div></div>
      <div class="summary-item"><div class="k">额度池</div><div class="v">${total||"-"}</div></div>
      <div class="summary-item"><div class="k">消耗占比</div><div class="v ${pct>85?"err":(pct>60?"warn":"ok")}">${total?pct+"%":"-"}</div></div>
    </div>
    <div class="pb">
      <div class="pb-label"><span>消耗进度（已用/额度池）</span><span>${total?pct+"%":"-"}</span></div>
      <div class="pb-track"><div class="pb-bar" style="width:${total?pct:0}%;background:${barColor}"></div></div>
      <div class="pb-meta">可用 ${remain} · 已用 ${used} · 池 ${total||0}（签到加包会抬高池和可用，不等于没消耗）</div>
    </div>
    ${currentFilter==="all"?`
    <div class="pb-meta" style="margin-top:10px">分区域：CN 可用 ${cnRemain} / 已用 ${cnUsed} · Global 可用 ${glRemain} / 已用 ${glUsed}</div>
    `:`
    <div class="pb-meta" style="margin-top:10px">全部账号池：可用 ${allRemain} · 已用 ${allUsed} · 池 ${allTotal||0}</div>
    `}
  `;
}
async function api(path, opts={}){
  const k=getKey();
  if(!k){
    showAuth();
    throw new Error("需要管理密钥");
  }
  if(Date.now()<authFailUntil){
    throw new Error("认证多次失败，请稍后重试（防 IP 封禁）");
  }
  const r=await fetch(API+path,{...opts,headers:{...(opts.headers||{}),...authHeaders(k)}});
  if(r.status===401){
    authFailCount++;
    sessionStorage.removeItem(SS_KEY);
    showAuth();
    if(authFailCount>=3){
      authFailUntil=Date.now()+60000;
      authFailCount=0;
      throw new Error("认证多次失败，请检查管理密钥后 60s 再试");
    }
    throw new Error("management key 无效或缺失");
  }
  if(r.status===403){
    authFailCount++;
    let body="";
    try{body=await r.text()}catch(_){}
    if(/IP banned|too many failed/i.test(body)){
      // Prefer upstream wait window (e.g. "Try again in 27m10s") when present.
      let waitMs=60000;
      const m=body.match(/(\d+)\s*m(?:in(?:ute)?s?)?\s*(\d+)\s*s/i)||body.match(/(\d+)\s*m/i);
      if(m){
        const mins=parseInt(m[1],10)||0;
        const secs=m[2]?parseInt(m[2],10):0;
        waitMs=Math.min(Math.max((mins*60+secs)*1000, 30000), 30*60*1000);
      }
      authFailUntil=Date.now()+waitMs;
      throw new Error(body.trim()||"IP 被封禁，请稍后再试");
    }
    if(authFailCount>=3){
      authFailUntil=Date.now()+60000;
      authFailCount=0;
    }
    throw new Error(body.trim()||"禁止访问 (403)");
  }
  authFailCount=0;
  return r.json();
}
async function load(force, btn){
  const g=document.getElementById("grid");
  if(!getKey()){
    showAuth();
    g.innerHTML='<div class="loading">请先填写 management key</div>';
    return;
  }
  // 刷新按钮：loading 态 + 右上角 toast。原先 force 路径静默调 /refresh，
  // 成功/失败都无反馈（签到按钮有 toast，刷新没有）。
  if(force){
    if(!btn) btn=document.getElementById("refreshBtn");
    busy(btn, true);
  }
  try{
    // force 时 /refresh 已返回完整 dashboard（buildDashboard(true)），
    // 不必再打 /accounts（之前多一次请求且吞掉 refresh 错误）。
    const d = force
      ? await api("/refresh", {method:"POST"})
      : await api("/accounts");
    document.getElementById("autoToggle").checked=!!d.checkin_auto;
    document.getElementById("svtime").textContent="服务器时间 "+(d.server_time||"");
    if(d.error){
      g.innerHTML='<div class="loading">'+esc(d.error)+"</div>";
      if(force) toast("刷新失败", "err", d.error);
      return;
    }
    const accounts=d.accounts||[];
    lastAccounts=accounts;
    updateFilterCounts(accounts);
    if(!accounts.length){
      g.innerHTML='<div class="loading">暂无 WorkBuddy 账号</div>';
      renderSummary([]);
      if(force) toast("数据已刷新", "warn", "暂无 WorkBuddy 账号");
      return;
    }
    g.innerHTML=accounts.map(card).join("");
    filterRegion(currentFilter, null);
    renderSummary(accounts);
    if(force){
      const errN=accounts.filter(a=>a.error).length;
      const life=(d.lifecycle||[]).length;
      let extra=accounts.length+" 个账号";
      if(errN) extra+=" · "+errN+" 个有错误";
      if(life) extra+=" · 生命周期 "+life+" 项";
      if(errN) toast("数据已刷新", "warn", extra);
      else toast("数据已刷新", "ok", extra);
    }
  }catch(e){
    if(force) toast("刷新失败", "err", e.message||String(e));
    // 强制刷新失败时保留旧卡片，只 toast；首次加载仍写错误到 grid。
    if(!force || !g.querySelector(".card")){
      g.innerHTML='<div class="loading">'+esc(e.message||String(e))+"</div>";
    }
  }finally{
    if(force) busy(btn, false);
  }
}
function checkinResultToast(res, who){
  const name=res.nickname||who||"账号";
  if(res.error){toast(name+"：签到失败","err",res.error);return}
  if(res.reason==="global"||(/国际版|不支持/.test(String(res.message||"")))){
    toast(name+"：国际版无需签到","warn",res.message||"请用领取专家加油包");return;
  }
  if(res.reason==="already"||(res.skipped&&/already|已签|今日/.test(String(res.message||"")))){
    toast(name+"：今日已签到","ok",res.message||"");return;
  }
  if(res.success){toast(name+"：签到成功","ok","+"+(res.credit??res.daily_credit??"")+" 积分 · 连续 "+(res.streak_days??"?")+" 天");return}
  toast(name+"："+(res.message||"未知结果"),"warn");
}
function isCheckinDoneResult(res){
  if(!res||res.error) return false;
  if(res.reason==="global") return false;
  if(res.success) return true;
  const msg=String(res.message||"");
  // already checked in today (backend) — treat as done, not failure
  if(/already|已签|今日/.test(msg) && !/国际版|不支持/.test(msg)) return true;
  return false;
}
async function checkin(idx, btn){
  busy(btn,true);
  try{
    const d=await api("/checkin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({auth_index:idx})});
    const res=(d.results||[])[0]||{};
    checkinResultToast(res);
    if(isCheckinDoneResult(res)){
      // Instant UI — do NOT busy(false) which restores "签到" before load finishes
      markCheckinDone(btn);
      // Optimistic local state so partial re-renders stay correct
      const a=(lastAccounts||[]).find(x=>x.auth_index===idx);
      if(a){
        a.checkin=Object.assign({}, a.checkin||{}, {today_checked_in:true});
      }
    }else{
      busy(btn,false);
    }
    // Await reload so card matches server; cache was cleared on backend for this account
    await load(false);
  }catch(e){
    toast("签到请求失败","err",e.message);
    busy(btn,false);
  }
}
async function checkinAll(btn){
  busy(btn,true);
  try{
    // Backend prefilters: Global skipped, already-checked skipped; only CN-need-checkin run.
    const d=await api("/checkin",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const rs=d.results||[];
    const s=d.summary||{};
    const ok=Number(s.success??rs.filter(x=>x.success&&x.reason!=="already"&&!x.skipped).length)||0;
    const already=Number(s.already??rs.filter(x=>isCheckinDoneResult(x)&&(x.reason==="already"||x.skipped||!x.success)).length)||0;
    const fail=Number(s.fail??rs.filter(x=>x.error).length)||0;
    const skippedGlobal=Number(s.skipped_global||0);
    const eligible=Number(s.eligible??(ok+fail))||0;
    const detailParts=[];
    if(skippedGlobal) detailParts.push("跳过 Global "+skippedGlobal);
    if(already) detailParts.push("今日已签 "+already);
    if(eligible) detailParts.push("待签 "+eligible);
    const detail=detailParts.join(" · ");
    if(d.error){toast("批量签到失败","err",d.error)}
    else if(fail){
      const errDetail=rs.filter(x=>x.error).map(x=>(x.nickname||"")+": "+x.error).join("；");
      toast("批量签到："+ok+" 成功 / "+fail+" 失败"+(already?" / "+already+" 已签":""),"err",errDetail||detail);
    }else if(ok){
      toast("批量签到："+ok+" 成功"+(already?" / "+already+" 今日已签":""),"ok",detail);
    }else if(already||skippedGlobal){
      toast("无需签到","ok",detail||"CN 今日已签 · Global 已跳过");
    }else if(!rs.length && !eligible){
      toast("没有需要签到的 CN 账号","warn",detail||"Global 不参与签到");
    }else{
      toast("没有需要签到的账号","warn",detail);
    }
    // Mark CN check-in buttons done immediately when any success/already
    if(ok||already){
      document.querySelectorAll("#grid .card").forEach(c=>{
        if((c.dataset.region||"cn")==="cn"){
          const b=c.querySelector("button.sec,button.done");
          if(b && /签到|处理中/.test(b.textContent||"")) markCheckinDone(b);
        }
      });
    }
    await load(false);
  }catch(e){toast("批量签到失败","err",e.message)}
  // load() re-renders grid; only restore toolbar button
  busy(btn,false);
}
async function claimTrial(idx, btn){
  busy(btn,true);
  try{
    const d=await api("/trial",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({auth_index:idx})});
    if(d.error){toast("领取失败","err",d.error);busy(btn,false);}
    else if(d.already_claimed){toast((d.nickname||"账号")+"：已领取过","warn",d.message||"");markTrialDone(btn);}
    else if(d.success){toast((d.nickname||"账号")+"：领取成功","ok","+250 积分 · 14天有效");markTrialDone(btn);}
    else{toast((d.nickname||"账号")+"："+(d.message||"未知"),"warn");busy(btn,false);}
    await load(false);
  }catch(e){toast("领取请求失败","err",e.message);busy(btn,false);}
}
async function claimTrialAll(btn){
  busy(btn,true);
  try{
    const d=await api("/accounts");
    const accounts=(d.accounts||[]).filter(a=>(a.region||"cn")==="global"&&!a.trial_claimed);
    if(!accounts.length){toast("没有可领取的账号","warn");busy(btn,false);return;}
    let ok=0,fail=0,already=0;
    for(const a of accounts){
      try{
        const r=await api("/trial",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({auth_index:a.auth_index})});
        if(r.success)ok++;else if(r.already_claimed||r.error)already++;else fail++;
      }catch(e){fail++;}
    }
    if(fail)toast("批量领取："+ok+" 成功 / "+already+" 已领 / "+fail+" 失败","err");
    else if(ok)toast("批量领取："+ok+" 成功"+(already?" / "+already+" 已领":""),"ok");
    else toast("全部账号已领取","warn");
    await load(false);
  }catch(e){toast("批量领取失败","err",e.message)}
  busy(btn,false);
}
async function toggleAuto(on){
  try{const d=await api("/checkin/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({enabled:on})});toast("自动签到已"+(d.checkin_auto?"开启 ✅":"关闭 ⏸"),"ok")}catch(e){toast("设置失败","err",e.message)}
}
function openImportModal(){
  const m=document.getElementById("importModal");
  m.classList.add("show");
  const ta=document.getElementById("importRaw");
  if(ta) setTimeout(()=>ta.focus(),0);
}
function closeImportModal(){
  document.getElementById("importModal").classList.remove("show");
}
function onImportMaskClick(e){
  if(e.target===document.getElementById("importModal")) closeImportModal();
}
async function importAuth(btn){
  const raw=(document.getElementById("importRaw").value||"").trim();
  if(!raw){toast("请粘贴凭证 JSON","warn");return}
  busy(btn,true);
  try{
    let payload={raw};
    try{payload={json:JSON.parse(raw)}}catch(_){}
    const d=await api("/import",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(d.success){
      toast("导入成功","ok",(d.nickname||d.uid||"")+ " → "+(d.file||d.name||""));
      document.getElementById("importRaw").value="";
      closeImportModal();
      load(true);
    }else toast("导入失败","err",d.error||"unknown");
  }catch(e){toast("导入请求失败","err",e.message)}
  busy(btn,false);
}
document.getElementById("keyInput").addEventListener("keydown",e=>{if(e.key==="Enter")saveKey()});
document.addEventListener("keydown",e=>{
  if(e.key=="Escape"&&document.getElementById("importModal").classList.contains("show")) closeImportModal();
});
/* Start theme sync watcher (parent MutationObserver + standalone prefers-color-scheme listener). */
if(window.__wbThemeSync)window.__wbThemeSync();
if(getKey()){
  load(false);
}else{
  showAuth();
}
